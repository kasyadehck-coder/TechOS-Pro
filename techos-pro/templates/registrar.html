<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>⚡ TechOS Pro — Criar Conta</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'JetBrains Mono',monospace;background:#0a0c0f;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:#e8edf5}
.card{background:#181d24;border:1px solid #252d38;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.logo{text-align:center;margin-bottom:28px}
.logo h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#00d4ff}
.logo p{font-size:11px;color:#4a5568;margin-top:6px;letter-spacing:2px;text-transform:uppercase}
.trial-info{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:12px;color:#00e676;text-align:center}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.fg label{font-size:10px;color:#8a97a8;text-transform:uppercase;letter-spacing:1px}
.fc{background:#141820;border:1px solid #252d38;border-radius:8px;padding:12px 14px;color:#e8edf5;font-size:13px;font-family:'JetBrains Mono',monospace;outline:none;transition:.15s;width:100%}
.fc:focus{border-color:#00d4ff;box-shadow:0 0 0 2px rgba(0,212,255,.1)}
.btn{width:100%;background:#00e676;color:#000;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:.15s;margin-top:8px}
.btn:hover{background:#00b84d}
.erro{background:rgba(255,61,90,.1);border:1px solid rgba(255,61,90,.3);border-radius:8px;padding:10px 14px;font-size:12px;color:#ff3d5a;margin-bottom:16px}
.link{text-align:center;margin-top:20px;font-size:12px;color:#4a5568}
.link a{color:#00d4ff}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>⚡ TechOS</h1>
    <p>Criar conta grátis</p>
  </div>
  <div class="trial-info">🎁 <strong>1 hora grátis</strong> para testar todos os módulos!</div>
  {% if erro %}<div class="erro">⚠️ {{erro}}</div>{% endif %}
  <form method="post">
    <div class="fg"><label>Nome da Loja / Empresa *</label><input class="fc" name="nome" placeholder="TechShop Curitiba" required autofocus></div>
    <div class="fg"><label>Usuário (login) *</label><input class="fc" name="usuario" placeholder="techshop_curitiba" required></div>
    <div class="fg"><label>Senha *</label><input class="fc" name="senha" type="password" placeholder="Mínimo 6 caracteres" required minlength="6"></div>
    <button class="btn" type="submit">🚀 Criar conta e testar grátis</button>
  </form>
  <div class="link">Já tem conta? <a href="/">Fazer login</a></div>
</div>
</body>
</html>
